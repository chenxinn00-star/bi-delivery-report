<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BI 套装系列发货数据</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --green: #047857;
      --green-soft: #ecfdf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 240px) 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .control-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 0 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 126px;
      overflow: auto;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
    }
    button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1d4ed8;
      font-weight: 700;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .metric .value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }
    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 10px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: var(--accent-soft);
      color: #1e3a8a;
      font-weight: 700;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: 0; }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }
    footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 760px) {
      .page { width: min(100% - 20px, 1180px); margin: 20px auto; }
      header { display: block; }
      h1 { font-size: 22px; }
      .controls { grid-template-columns: 1fr; }
      th, td { padding: 11px 12px; }
    }
  </style>
</head>

    const columns = [{"field": "record_date", "label": "日期"}, {"field": "combination_product_series", "label": "套装系列"}, {"field": "delivery_amount_num", "label": "发货金额"}, {"field": "net_shipment_amount", "label": "净发货金额"}];
    const dateField = (columns.find(c => c.field === "record_date") || columns.find(c => c.label === "日期") || columns[0] || {}).field;

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function isNumericField(field) {
      return rows.some(row => toNumber(row[field]) !== null);
    }

    const metricColumns = columns.filter(c => isNumericField(c.field));
    const dimensionColumns = columns.filter(c => c.field !== dateField && !isNumericField(c.field));
    const seriesColumn =
      dimensionColumns.find(c => /系列|品类|归属|分类/.test(c.label)) ||
      dimensionColumns[0] ||
      { field: "__all__", label: "系列" };

    let selectedDate = "";
    let selectedSeries = "__all__";

    function formatAmount(value) {
      const num = toNumber(value);
      if (num === null) return value === undefined || value === null ? "" : String(value);
      return num.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function uniqueValues(field) {
      return [...new Set(rows.map(row => row[field]).filter(value => value !== undefined && value !== null && value !== ""))].sort();
    }

    function sumField(list, field) {
      return list.reduce((sum, row) => sum + (toNumber(row[field]) || 0), 0);
    }

    function renderSummary(dayRows) {
      const cards = [`<div class="metric"><div class="label">当日记录数</div><div class="value">${dayRows.length}</div></div>`];
      metricColumns.slice(0, 4).forEach(column => {
        cards.push(`<div class="metric"><div class="label">${column.label}合计</div><div class="value">${formatAmount(sumField(dayRows, column.field))}</div></div>`);
      });
      document.getElementById("summary").innerHTML = cards.join("");
    }

    function renderTable(el, tableRows, tableColumns) {
      if (!tableRows.length) {
        el.innerHTML = `<tbody><tr><td class="empty">暂无数据</td></tr></tbody>`;
        return;
      }
      const head = tableColumns.map(column => {
        const cls = isNumericField(column.field) ? ` class="num"` : "";
        return `<th${cls}>${column.label}</th>`;
      }).join("");
      const body = tableRows.map(row => {
        return `<tr>${tableColumns.map(column => {
          const numeric = isNumericField(column.field);
          const value = numeric ? formatAmount(row[column.field]) : (row[column.field] ?? "");
          return `<td${numeric ? ` class="num"` : ""}>${value}</td>`;
        }).join("")}</tr>`;
      }).join("");
      el.innerHTML = `<thead><tr>${head}</tr></thead><tbody>${body}</tbody>`;
    }

    function aggregateBy(list, field) {
      const map = new Map();
      list.forEach(row => {
        const key = field === "__all__" ? "全部" : (row[field] || "未分类");
        if (!map.has(key)) map.set(key, { [field]: key });
        const target = map.get(key);
        metricColumns.forEach(column => {
          target[column.field] = (target[column.field] || 0) + (toNumber(row[column.field]) || 0);
        });
      });
      return [...map.values()];
    }

    function render() {
      const dayRows = rows.filter(row => String(row[dateField]) === selectedDate);
      const currentRows = selectedSeries === "__all__"
        ? dayRows
        : dayRows.filter(row => String(row[seriesColumn.field] || "未分类") === selectedSeries);
      renderSummary(currentRows);

      const dayGrouped = aggregateBy(dayRows, seriesColumn.field);
      renderTable(
        document.getElementById("dayTable"),
        dayGrouped,
        [{ field: seriesColumn.field, label: seriesColumn.label }, ...metricColumns]
      );

      const trendRows = selectedSeries === "__all__"
        ? aggregateBy(rows, dateField)
        : rows.filter(row => String(row[seriesColumn.field] || "未分类") === selectedSeries);
      const trendColumns = selectedSeries === "__all__"
        ? [{ field: dateField, label: "日期" }, ...metricColumns]
        : [{ field: dateField, label: "日期" }, seriesColumn, ...metricColumns];
      renderTable(document.getElementById("trendTable"), trendRows, trendColumns);

      document.getElementById("dayTitle").textContent = `${selectedDate} 各${seriesColumn.label}`;
      document.getElementById("dayMeta").textContent = `当前：${selectedSeries === "__all__" ? "全部" : selectedSeries}`;
      document.getElementById("trendTitle").textContent = selectedSeries === "__all__" ? "全部系列每日合计" : `${selectedSeries} 每日明细`;
      document.getElementById("trendMeta").textContent = `${rows.length} 条原始记录`;
    }

    function init() {
      const dates = uniqueValues(dateField);
      selectedDate = dates[dates.length - 1] || "";
      const dateSelect = document.getElementById("dateSelect");
      dateSelect.innerHTML = dates.map(date => `<option value="${date}">${date}</option>`).join("");
      dateSelect.value = selectedDate;
      dateSelect.addEventListener("change", event => {
        selectedDate = event.target.value;
        render();
      });

      document.getElementById("seriesLabel").textContent = seriesColumn.label;
      const seriesValues = seriesColumn.field === "__all__" ? [] : uniqueValues(seriesColumn.field).map(String);
      const buttons = [{ value: "__all__", label: "全部" }, ...seriesValues.map(value => ({ value, label: value || "未分类" }))];
      document.getElementById("seriesButtons").innerHTML = buttons.map(item => `<button type="button" data-value="${item.value}" class="${item.value === selectedSeries ? "active" : ""}">${item.label}</button>`).join("");
      document.getElementById("seriesButtons").addEventListener("click", event => {
        if (event.target.tagName !== "BUTTON") return;
        selectedSeries = event.target.dataset.value;
        document.querySelectorAll("#seriesButtons button").forEach(button => {
          button.classList.toggle("active", button.dataset.value === selectedSeries);
        });
        render();
      });
      render();
    }

    init();
  </script>
